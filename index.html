<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>インシデント報告レコード</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Meiryo, 'Hiragino Sans', sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 24px 16px 48px;
      min-height: 100vh;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 24px;
    }
    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
    }
    .page-header p {
      font-size: 12px;
      color: #777;
      margin-top: 4px;
    }

    /* User section */
    .user-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-left: 4px solid #3b82f6;
    }

    /* Section cards */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 22px 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }
    .badge-blue   { background: #3b82f6; }
    .badge-orange { background: #f59e0b; }
    .badge-green  { background: #22c55e; }
    .badge-purple { background: #a855f7; }
    .badge-teal   { background: #14b8a6; }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #444;
    }

    /* Grid layouts */
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .row1 { display: grid; grid-template-columns: 1fr; gap: 14px; margin-bottom: 14px; }

    /* Form group */
    .fg { display: flex; flex-direction: column; gap: 5px; }
    .fg label {
      font-size: 12px;
      font-weight: 600;
      color: #555;
    }
    .req { color: #ef4444; }

    .fg input,
    .fg select,
    .fg textarea {
      padding: 8px 11px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      color: #333;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .fg input:focus,
    .fg select:focus,
    .fg textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }
    .fg input::placeholder,
    .fg textarea::placeholder { color: #bbb; font-size: 12px; }
    .fg textarea { resize: vertical; min-height: 80px; }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 2px; }

    /* Priority buttons */
    .priority-row {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .prio-btn {
      flex: 1;
      padding: 10px 6px 8px;
      border-radius: 9px;
      border: 2px solid transparent;
      cursor: pointer;
      text-align: center;
      font-weight: 800;
      font-size: 14px;
      line-height: 1;
      transition: all 0.18s;
      user-select: none;
    }
    .prio-btn .sub { font-size: 10px; font-weight: 600; margin-top: 3px; }

    .prio-btn.p1 { background: #fff1f2; color: #ef4444; border-color: #fca5a5; }
    .prio-btn.p2 { background: #fff7ed; color: #f97316; border-color: #fdba74; }
    .prio-btn.p3 { background: #eff6ff; color: #3b82f6; border-color: #93c5fd; }
    .prio-btn.p4 { background: #f5f3ff; color: #8b5cf6; border-color: #c4b5fd; }

    .prio-btn.p1:hover { background: #fee2e2; }
    .prio-btn.p2:hover { background: #fed7aa; }
    .prio-btn.p3:hover { background: #dbeafe; }
    .prio-btn.p4:hover { background: #ede9fe; }

    .prio-btn.selected.p1 { background: #ef4444; color: #fff; border-color: #ef4444; box-shadow: 0 2px 8px rgba(239,68,68,0.35); transform: translateY(-1px); }
    .prio-btn.selected.p2 { background: #f97316; color: #fff; border-color: #f97316; box-shadow: 0 2px 8px rgba(249,115,22,0.35); transform: translateY(-1px); }
    .prio-btn.selected.p3 { background: #3b82f6; color: #fff; border-color: #3b82f6; box-shadow: 0 2px 8px rgba(59,130,246,0.35); transform: translateY(-1px); }
    .prio-btn.selected.p4 { background: #8b5cf6; color: #fff; border-color: #8b5cf6; box-shadow: 0 2px 8px rgba(139,92,246,0.35); transform: translateY(-1px); }

    /* Dividers in 5W section */
    .fw-item { margin-bottom: 12px; }

    /* Footer */
    .form-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding-top: 8px;
    }
    .btn {
      padding: 11px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
    }
    .btn-draft {
      background: #fff;
      color: #555;
      border: 1px solid #d1d5db;
    }
    .btn-draft:hover { background: #f3f4f6; }
    .btn-submit {
      background: #3b82f6;
      color: #fff;
      box-shadow: 0 2px 6px rgba(59,130,246,0.3);
    }
    .btn-submit:hover { background: #2563eb; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 580px) {
      .row2, .row3 { grid-template-columns: 1fr; }
      .priority-row { flex-wrap: wrap; }
      .prio-btn { flex: 1 1 40%; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <h1>インシデント報告レコード</h1>
    <p>Incident Report Record — ロボット搬送システム運用</p>
  </div>

  <form id="incidentForm" action="" method="POST" onsubmit="return prepareSubmit(event)">

    <!-- SSGform hidden fields -->
    <input type="hidden" name="subject" id="hiddenSubject">
    <input type="hidden" name="message" id="hiddenMessage">

    <!-- ユーザー名 -->
    <div class="user-card">
      <div class="fg">
        <label for="userName">報告者（ユーザー名）<span class="req">*</span></label>
        <select id="userName" required>
          <option value="">-- 選択してください --</option>
          <option>Rapidus A/W</option>
          <option>Rapidus DJK</option>
          <option>TOYOTA</option>
          <option>KDDI</option>
          <option>GIGAPHOTON</option>
          <option>中外製薬</option>
        </select>
      </div>
    </div>

    <!-- A 基本情報 -->
    <div class="card">
      <div class="card-header">
        <span class="badge badge-blue">A 基本情報</span>
        <span class="card-title">発生日時・場所・対象機器</span>
      </div>

      <div class="row2">
        <div class="fg">
          <label for="occurrenceTime">発生日時 <span class="req">*</span></label>
          <input type="datetime-local" id="occurrenceTime" required>
        </div>
        <div class="fg">
          <label for="reportTime">報告日時 <span class="req">*</span></label>
          <input type="datetime-local" id="reportTime" required>
          <span class="hint">自動入力（変更可）</span>
        </div>
      </div>

      <div class="row2">
        <div class="fg">
          <label for="location">発生場所 <span class="req">*</span></label>
          <input type="text" id="location" placeholder="例：第1工場 Aライン、倉庫B エリア3" required>
        </div>
        <div class="fg">
          <label for="frequency">発生頻度</label>
          <select id="frequency">
            <option value="">-- 選択してください --</option>
            <option>初回</option>
            <option>断続的（過去にも発生）</option>
            <option>継続中</option>
            <option>定期的</option>
          </select>
        </div>
      </div>

      <div class="row3">
        <div class="fg">
          <label for="model">機種 <span class="req">*</span></label>
          <select id="model" required>
            <option value="">-- 選択 --</option>
            <option>WILL-FA</option>
            <option>WILL-SR</option>
            <option>ciMoMa-SLIM</option>
            <option>ciMoMa-GIANT</option>
            <option>充電器</option>
          </select>
        </div>
        <div class="fg">
          <label for="unitNumber">号機 <span class="req">*</span></label>
          <input type="text" id="unitNumber" placeholder="例：#03、#07" required>
        </div>
        <div class="fg">
          <label for="errorCode">エラーコード / 種別</label>
          <input type="text" id="errorCode" placeholder="例：E-204、通信断">
        </div>
      </div>
    </div>

    <!-- B 優先度・影響範囲 -->
    <div class="card">
      <div class="card-header">
        <span class="badge badge-orange">B 優先度・影響範囲</span>
        <span class="card-title">影響度と緊急度の評価</span>
      </div>

      <div class="row2">
        <div class="fg">
          <label>優先度 <span class="req">*</span></label>
          <input type="hidden" id="priority">
          <div class="priority-row">
            <button type="button" class="prio-btn p1" data-val="P1" onclick="selectPriority(this)">P1<div class="sub">緊急</div></button>
            <button type="button" class="prio-btn p2" data-val="P2" onclick="selectPriority(this)">P2<div class="sub">高</div></button>
            <button type="button" class="prio-btn p3" data-val="P3" onclick="selectPriority(this)">P3<div class="sub">中</div></button>
            <button type="button" class="prio-btn p4" data-val="P4" onclick="selectPriority(this)">P4<div class="sub">低</div></button>
          </div>
        </div>
        <div class="fg">
          <label for="impactScope">影響範囲 <span class="req">*</span></label>
          <select id="impactScope" required>
            <option value="">-- 選択してください --</option>
            <option>生産停止（全ライン）</option>
            <option>生産停止（一部ライン）</option>
            <option>速度低下・遅延</option>
            <option>代替手段で運用中</option>
            <option>影響なし</option>
          </select>
          <span class="hint">具体的なライン名は事象欄に記載</span>
        </div>
      </div>

      <div class="row2">
        <div class="fg">
          <label for="operationStatus">運用継続可否 <span class="req">*</span></label>
          <select id="operationStatus" required>
            <option value="">-- 選択してください --</option>
            <option>全機能使用不可</option>
            <option>一部機能のみ使用不可</option>
            <option>代替手段で運用可能</option>
            <option>通常運用に支障なし</option>
          </select>
        </div>
        <div class="fg">
          <label for="deadline">対応期限（目標）</label>
          <input type="datetime-local" id="deadline">
          <span class="hint">SLAまたは顧客要求に基づく設定</span>
        </div>
      </div>
    </div>

    <!-- C 事象詳細 5W -->
    <div class="card">
      <div class="card-header">
        <span class="badge badge-green">C 事象詳細（5W）</span>
        <span class="card-title">何が起きたかを構造化して記述</span>
      </div>
      <p style="font-size:11px;color:#9ca3af;margin-bottom:14px;">わかる範囲で記載してください。</p>

      <div class="fw-item fg">
        <label for="when5w">When（いつ）</label>
        <input type="text" id="when5w" placeholder="発生タイミング・周期・継続時間（例：搬送動作中、夜間のみ）">
      </div>
      <div class="fw-item fg">
        <label for="where5w">Where（どこで）</label>
        <input type="text" id="where5w" placeholder="具体的な場所・ルート・ゾーン（例：Aライン⇔充電ステーション間）">
      </div>
      <div class="fw-item fg">
        <label for="who5w">Who（誰が）</label>
        <input type="text" id="who5w" placeholder="対象の機器・担当者・関係チーム">
      </div>
      <div class="fw-item fg">
        <label for="what5w">What（何を）</label>
        <input type="text" id="what5w" placeholder="対象の業務・動作・搬送物（例：空パレット搬送時）">
      </div>
      <div class="fw-item fg">
        <label for="why5w">Why（なぜ）</label>
        <input type="text" id="why5w" placeholder="推定原因・背景・直前の操作（不明な場合は「不明」）">
      </div>
      <div class="fg">
        <label for="detail">事象の詳細（自由記述）<span class="req">*</span></label>
        <textarea id="detail" rows="4" placeholder="上記5Wを補足する内容、エラーメッセージ、目撃状況、再現手順など" required></textarea>
      </div>
    </div>

    <!-- D 調査・確認内容 -->
    <div class="card">
      <div class="card-header">
        <span class="badge badge-purple">D 調査・確認内容</span>
        <span class="card-title">事象に対して確認・試みたこと</span>
      </div>

      <div class="row1">
        <div class="fg">
          <label for="investigation">調査内容</label>
          <textarea id="investigation" rows="3" placeholder="確認したログ・センサー値、試みた操作、確認済みの仮説など"></textarea>
        </div>
      </div>

      <div class="row2">
        <div class="fg">
          <label for="reproducibility">再現性</label>
          <select id="reproducibility">
            <option value="">-- 選択してください --</option>
            <option>未確認</option>
            <option>再現手順あり</option>
            <option>条件依存（再現条件を調査中）</option>
            <option>再現なし</option>
          </select>
        </div>
        <div class="fg">
          <label for="knownError">既知エラーとの一致</label>
          <select id="knownError">
            <option value="">-- 選択してください --</option>
            <option>類似事例あり</option>
            <option>既知エラー</option>
            <option>新規事象</option>
            <option>不明</option>
          </select>
        </div>
      </div>
    </div>

    <!-- E 対策・依頼事項 -->
    <div class="card">
      <div class="card-header">
        <span class="badge badge-teal">E 対策・依頼事項</span>
        <span class="card-title">いつまでに何をしてほしいか</span>
      </div>

      <div class="row1">
        <div class="fg">
          <label for="actionRequest">依頼内容・アクション</label>
          <textarea id="actionRequest" rows="3" placeholder="例：本日中に現地確認をお願いしたい。ファームウェアの確認と暫定対応（手動搬送への切り替え）を依頼。"></textarea>
        </div>
      </div>
      <div class="row1">
        <div class="fg">
          <label for="notes">その他・特記事項</label>
          <textarea id="notes" rows="3" placeholder="顧客からの申し送り、関連チケット番号、添付資料の案内など"></textarea>
        </div>
      </div>
    </div>

    <div class="form-footer">
      <button type="button" class="btn btn-draft" onclick="saveDraft()">書き出し保存</button>
      <button type="submit" class="btn btn-submit">送信</button>
    </div>

  </form>
</div>

<div id="toast"></div>

<footer style="text-align:center;padding:16px 0 8px;font-size:11px;color:#bbb;">
  ver. 2026-04-22 12:58
</footer>

<script>
  const SSGFORM_URLS = {
    'GIGAPHOTON':   'https://ssgform.com/s/O7VSiCcnv9dW',
    'KDDI':         'https://ssgform.com/s/yPdQ5CuZUick',
    'Rapidus A/W':  'https://ssgform.com/s/9GKYXFlKSxRq',
    'Rapidus DJK':  'https://ssgform.com/s/gqOCJt3qyJW1',
    'TOYOTA':       'https://ssgform.com/s/8XFLqlKvsVU8',
    '中外製薬':      'https://ssgform.com/s/XJKMdkFWQqwc',
  };

  const FIELDS = [
    'userName','occurrenceTime','reportTime','location','frequency',
    'model','unitNumber','errorCode','priority','impactScope','operationStatus',
    'deadline','when5w','where5w','who5w','what5w','why5w','detail',
    'investigation','reproducibility','knownError','actionRequest','notes'
  ];

  function fmtDt(val) {
    if (!val) return '（未入力）';
    return val.replace('T', ' ');
  }
  function val(id) {
    return document.getElementById(id).value.trim() || '（未入力）';
  }

  function padZ(n) { return String(n).padStart(2,'0'); }
  function nowLocal() {
    const d = new Date();
    return `${d.getFullYear()}-${padZ(d.getMonth()+1)}-${padZ(d.getDate())}T${padZ(d.getHours())}:${padZ(d.getMinutes())}`;
  }

  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('reportTime').value = nowLocal();
    loadDraft();
  });

  function selectPriority(btn) {
    document.querySelectorAll('.prio-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('priority').value = btn.dataset.val;
  }

  function buildMessage() {
    return `■ インシデント報告レコード
━━━━━━━━━━━━━━━━━━━━━━━━━━━━

【報告者】${val('userName')}

━━ A. 基本情報 ━━━━━━━━━━━━━━━━━━━━━

発生日時　　：${fmtDt(document.getElementById('occurrenceTime').value)}
報告日時　　：${fmtDt(document.getElementById('reportTime').value)}
発生場所　　：${val('location')}
発生頻度　　：${val('frequency')}
機種　　　　：${val('model')}
号機　　　　：${val('unitNumber')}
エラーコード：${val('errorCode')}

━━ B. 優先度・影響範囲 ━━━━━━━━━━━━━━━━

優先度　　　：${val('priority')}
影響範囲　　：${val('impactScope')}
運用継続可否：${val('operationStatus')}
対応期限　　：${fmtDt(document.getElementById('deadline').value)}

━━ C. 事象詳細（5W） ━━━━━━━━━━━━━━━━━

When（いつ）　 ：${val('when5w')}
Where（どこで）：${val('where5w')}
Who（誰が）　 ：${val('who5w')}
What（何を）　 ：${val('what5w')}
Why（なぜ）　 ：${val('why5w')}

【事象の詳細】
${val('detail')}

━━ D. 調査・確認内容 ━━━━━━━━━━━━━━━━━

【調査内容】
${val('investigation')}

再現性　　　　　 ：${val('reproducibility')}
既知エラーとの一致：${val('knownError')}

━━ E. 対策・依頼事項 ━━━━━━━━━━━━━━━━━

【依頼内容・アクション】
${val('actionRequest')}

【その他・特記事項】
${val('notes')}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━
`;
  }

  function prepareSubmit(e) {
    e.preventDefault();

    const user = document.getElementById('userName').value;
    const url  = SSGFORM_URLS[user];
    if (!url) {
      showToast('報告者を選択してください。');
      return;
    }

    if (!document.getElementById('priority').value) {
      showToast('優先度を選択してください。');
      return;
    }

    const form = document.getElementById('incidentForm');
    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    const model = val('model');
    const unit  = val('unitNumber');
    const prio  = val('priority');
    const dt    = fmtDt(document.getElementById('occurrenceTime').value);

    document.getElementById('hiddenSubject').value =
      `[インシデント報告] ${model} ${unit} - ${prio} (${dt}) [${user}]`;
    document.getElementById('hiddenMessage').value = buildMessage();

    form.action = url;
    form.submit();
  }

  function saveDraft() {
    const draft = {};
    FIELDS.forEach(id => { draft[id] = document.getElementById(id).value; });
    localStorage.setItem('incidentDraft_v1', JSON.stringify(draft));

    const text = buildMessage();
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const d    = new Date();
    a.href     = url;
    a.download = `incident_${d.getFullYear()}${padZ(d.getMonth()+1)}${padZ(d.getDate())}_${padZ(d.getHours())}${padZ(d.getMinutes())}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast('下書きを保存しました（テキストファイルをダウンロード）');
  }

  function loadDraft() {
    const saved = localStorage.getItem('incidentDraft_v1');
    if (!saved) return;
    if (!confirm('保存された下書きがあります。復元しますか？')) return;

    const draft = JSON.parse(saved);
    FIELDS.forEach(id => {
      const el = document.getElementById(id);
      if (el && draft[id] !== undefined) el.value = draft[id];
    });

    if (draft.priority) {
      const btn = document.querySelector(`.prio-btn[data-val="${draft.priority}"]`);
      if (btn) btn.classList.add('selected');
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
